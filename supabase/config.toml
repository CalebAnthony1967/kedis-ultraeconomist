# ============================================================================
# KEDIS UltraEconomist — Supabase Project Configuration
# ============================================================================
# This file is used by the Supabase CLI for local development and deployment.
# Install CLI: npm install -g supabase
# Link project: supabase link --project-ref smkwoszizgbvflrczsge
# ============================================================================

project_id = "kedis-ultraeconomist"

[api]
enabled = true
port = 54321
schemas = ["public", "kedis_meta"]
extra_search_path = ["public", "kedis_meta"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/login", "http://localhost:5173/reset-password"]
jwt_expiry = 3600
refresh_token_rotation_enabled = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
max_frequency = "1s"

[auth.email.template.invite]
subject = "You're invited to KEDIS UltraEconomist"
content_path = "./supabase/templates/invite.html"

[auth.external.google]
enabled = false

[edge_runtime]
enabled = true
inspector_port = 8083

[analytics]
enabled = false